<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Todo Online</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-bg"></div>

    <main id="auth-shell" class="auth-shell">
      <section class="hero-copy">
        <p class="eyebrow">Task orchestration</p>
        <h1>Todo Online</h1>
        <p class="hero-text">A polished task board with quick notes, kanban lanes, history, and live session control.</p>
      </section>

      <section class="auth-card">
        <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
          <button id="auth-tab-login" class="auth-tab active" type="button">Sign in</button>
          <button id="auth-tab-register" class="auth-tab" type="button">Create account</button>
        </div>

        <form id="login-form" class="auth-form">
          <label>
            Email or username
            <input id="login-identity" autocomplete="username" placeholder="name@domain.com or username" />
          </label>
          <label>
            Password
            <input id="login-password" type="password" autocomplete="current-password" placeholder="Password" />
          </label>
          <button class="primary-btn" id="login-btn" type="submit">Sign in</button>
        </form>

        <form id="register-form" class="auth-form hidden">
          <label>
            Email
            <input id="register-email" autocomplete="email" placeholder="name@domain.com" />
          </label>
          <label>
            Username
            <input id="register-username" autocomplete="username" placeholder="Choose a username" />
          </label>
          <label>
            Password
            <input id="register-password" type="password" autocomplete="new-password" placeholder="Create a password" />
          </label>
          <button class="primary-btn" id="register-btn" type="submit">Create account</button>
        </form>

        <p id="auth-status" class="status-line"></p>
      </section>
    </main>

    <main id="app-shell" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand-block">
          <span class="eyebrow">Workspace</span>
          <h2>Todo Online</h2>
          <p id="user-meta" class="muted"></p>
        </div>

        <nav class="nav-stack" aria-label="Primary">
          <button class="nav-btn active" data-view="tasks">Tasks</button>
          <button class="nav-btn" data-view="quick">Quick</button>
          <button class="nav-btn" data-view="kanban">Kanban</button>
          <button class="nav-btn" data-view="history">History</button>
          <button class="nav-btn" data-view="notes">Notes</button>
          <button class="nav-btn" data-view="settings">Settings</button>
        </nav>

        <div class="sidebar-actions">
          <button id="logout-btn" class="secondary-btn" type="button">Logout</button>
          <button id="revoke-others-btn" class="ghost-btn" type="button">Revoke other sessions</button>
        </div>
      </aside>

      <section class="workspace-shell">
        <header class="topbar">
          <div>
            <p id="view-kicker" class="eyebrow">Dashboard</p>
            <h1 id="view-title">Tasks</h1>
          </div>
          <div id="topbar-badge" class="status-pill">Connected</div>
        </header>

        <section id="view-root" class="view-root"></section>
      </section>
    </main>

    <div id="toast-root" class="toast-root" aria-live="polite"></div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
